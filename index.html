<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финансовый трекер</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  
  <div class="card card-header" id="goal-card">
    <div class="title-row goal-header" id="goal-toggle">
      <div class="title">🎯 Финансовая цель</div>
      <div class="header-controls">
        <button id="settings-btn" class="close-btn" title="Настройки">⚙️</button>
        <button id="close-btn" class="close-btn" title="Закрыть">✕</button>
      </div>
    </div>
    <div class="goal-content" id="goal-content">
      <div class="input-row">
        <div class="field floating-field"><label for="target">Цель</label><input type="text" id="target" value="5 000 000" class="money"></div>
        <div class="field floating-field"><label for="deadline">Дедлайн</label><input type="date" id="deadline" value="2030-01-01"></div>
      </div>
    </div>
    <div class="progress"><div class="bar"><div class="fill" id="bar"></div><span class="percent" id="percent">0%</span></div></div>
    <div class="addons-panel" id="addons-panel">
      <button id="addon-trading-btn" class="addon-btn" title="Дневник трейдинга">
        <span class="addon-icon">📈</span>
        <span class="addon-name">TradingDiary</span>
      </button>
    </div>
    <div class="stats goal-content" id="goal-stats">
      <div class="stat"><span class="label">Осталось</span><span class="value" id="remain">—</span></div>
      <div class="stat"><span class="label">Дней</span><span class="value" id="days">—</span></div>
      <div class="stat"><span class="label">В месяц</span><span class="value" id="monthly">—</span></div>
      <div class="stat"><span class="label">В день</span><span class="value" id="daily">—</span></div>
    </div>
  </div>

  <div class="card" id="capital-card">
    <div class="capital-header" id="capital-toggle">
      <div class="capital-title-wrapper">
        <div class="title">💰 Капитал</div>
        <span id="capital-total-badge" class="counter">0 ₽</span>
      </div>
    </div>
    <div class="capital-content" id="capital-content">
      <div class="capital-row">
        <div class="field half"><label>Личный капитал</label><input type="text" id="personal" class="money"></div>
        <div class="field half"><label>% годовых</label><input type="number" id="personal-rate" value="14" step="0.5"></div>
      </div>
      <div class="capital-row">
        <div class="field half"><label>В управлении</label><input type="text" id="managed" class="money"></div>
        <div class="field half"><label>% годовых</label><input type="number" id="managed-rate" value="18" step="0.5"></div>
      </div>
      
      <div class="income-section">
        <div class="income-title">💵 Добавить доход</div>
        <div class="income-row">
          <input type="text" id="income-amount" class="money" placeholder="Сумма" value="0">
          <button id="add-income-btn">+ Добавить</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="tasks-header" id="tasks-toggle">
      <div class="title-with-toggle">
        <span class="title">📋 Задачи <span id="task-counter" class="counter">0/0</span></span>
        <button id="toggle-expand-tasks-btn" class="toggle-expand-btn" title="Развернуть бэклог">▼</button>
      </div>
      <button id="active-file-btn" class="active-file-btn">Дела</button>
      <button id="add-task-trigger-btn" class="add-task-trigger-btn" title="Добавить задачу">+ Добавить задачу</button>
    </div>
    
    <!-- Инлайновое добавление новой задачи (скрыто по умолчанию) -->
    <div class="tasks-content" id="tasks-content">
    <div class="add-task-inline-row hidden" id="inline-add-task-row">
      <input type="text" id="inline-new-task-input" class="task-input" placeholder="Добавить новую задачу...">
      <button id="inline-add-task-submit" class="add-task-btn">+</button>
    </div>

    <div id="tasks" class="tasks-list"></div>
    </div>
  </div>

  <div class="card">
    <div class="tasks-header daily-header" id="daily-toggle">
      <div class="title-with-toggle">
        <span class="title">☀️ Ежедневно <span id="daily-task-counter" class="counter">0/0</span></span>
      </div>
      <div style="display: flex; gap: 6px; align-items: center; -webkit-app-region: no-drag;">
        <button id="daily-analytics-btn" class="add-task-trigger-btn" style="background: var(--bg-button); border: 1px solid var(--border-color); color: var(--accent-color);" title="Аналитика">📊 Аналитика</button>
        <button id="add-daily-task-trigger-btn" class="add-task-trigger-btn" title="Добавить ежедневную задачу">+ Добавить</button>
      </div>
    </div>
    
    <div class="tasks-content" id="daily-content">
    <div class="add-task-inline-row hidden" id="inline-add-daily-task-row">
      <input type="text" id="inline-new-daily-task-input" class="task-input" placeholder="Добавить ежедневную задачу...">
      <button id="inline-add-daily-task-submit" class="add-task-btn">+</button>
    </div>

    <div id="daily-tasks" class="tasks-list daily-tasks-list"></div>
    </div>
  </div>
</div>

<!-- Модальное окно действий с задачей -->
<div id="task-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">Управление задачей</div>
      <button class="modal-close" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="modal-body">
      <button class="modal-action-btn" id="modal-pin-btn">📌 Сделать приоритетной</button>
      <button class="modal-action-btn" id="modal-edit-btn">✏️ Редактировать</button>
      <button class="modal-action-btn" id="modal-add-subtask-btn">↳ Добавить подзадачу</button>
      <button class="modal-action-btn" id="modal-move-btn">📂 Переместить задачу...</button>
      <button class="modal-action-btn delete" id="modal-delete-btn">🗑️ Удалить задачу</button>
    </div>
  </div>
</div>

<!-- Модальное окно выбора активного файла -->
<div id="file-selector-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">Выберите файл задач</div>
      <button class="modal-close" onclick="closeFileSelectorModal()">✕</button>
    </div>
    <div class="modal-body" id="file-selector-list" style="max-height: 200px; overflow-y: auto;">
      <!-- Динамический список файлов -->
    </div>
  </div>
</div>

<!-- Модальное окно действий с файлом -->
<div id="file-action-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">Файл задач</div>
      <button class="modal-close" onclick="closeFileActionModal()">✕</button>
    </div>
    <div class="modal-body">
      <button class="modal-action-btn" id="file-rename-btn">✏️ Переименовать</button>
      <button class="modal-action-btn delete" id="file-delete-btn">🗑️ Удалить файл</button>
    </div>
  </div>
</div>

<!-- Модальное окно переноса задачи -->
<div id="move-task-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">Переместить задачу в...</div>
      <button class="modal-close" onclick="closeMoveTaskModal()">✕</button>
    </div>
    <div class="modal-body" id="move-task-list" style="max-height: 200px; overflow-y: auto;">
      <!-- Динамический список целевых файлов -->
    </div>
  </div>
</div>

<!-- Модальное окно настроек -->
<div id="settings-modal" class="modal-overlay hidden">
  <div class="modal-content settings-modal-content">
    <div class="modal-header">
      <div class="modal-title">⚙️ Настройки виджета</div>
      <button class="modal-close" onclick="closeSettingsModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Раздел: Оформление -->
      <div class="settings-section">
        <div class="settings-section-title">🎨 Цветовые оттенки</div>
        
        <div class="setting-row">
          <label>Фоновая тема:</label>
          <div class="theme-toggle-group">
            <button id="theme-dark-btn" class="theme-btn active">Темная</button>
            <button id="theme-light-btn" class="theme-btn">Светлая</button>
          </div>
        </div>
        
        <div class="setting-row">
          <label>Основной цвет:</label>
          <div class="color-palette" id="color-palette">
            <!-- Динамические кружочки -->
          </div>
        </div>
      </div>
      
      <!-- Раздел: Перерывы -->
      <div class="settings-section">
        <div class="settings-section-title">⏳ Напоминание о перерыве</div>
        
        <div class="setting-row">
          <label for="break-interval-select">Период уведомлений:</label>
          <select id="break-interval-select" class="settings-select">
            <option value="0">Выключено</option>
            <option value="15">Каждые 15 минут</option>
            <option value="30">Каждые 30 минут</option>
            <option value="45">Каждые 45 минут</option>
            <option value="60">Каждый час</option>
            <option value="90">Каждые 1.5 часа</option>
          </select>
          <div class="break-countdown-status" id="break-countdown-status">Уведомления выключены</div>
        </div>

        <div class="setting-row">
          <label for="break-sound-select">Звук уведомления:</label>
          <select id="break-sound-select" class="settings-select">
            <option value="chime">Мягкий перелив</option>
            <option value="bell">Ясный колокольчик</option>
            <option value="focus">Фокус-сигнал</option>
            <option value="water">Водяная капля</option>
            <option value="none">Без звука</option>
          </select>
        </div>
        
        <div class="setting-row">
          <label>Визуальный сигнал (видео/картинка):</label>
          <div style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
            <div style="display: flex; gap: 6px; width: 100%;">
              <input type="text" id="break-media-path" class="settings-input" placeholder="По умолчанию (кофе)" readonly style="font-size: 11px;">
              <button id="select-media-btn" class="settings-action-btn" style="flex-shrink: 0; padding: 6px 10px;">Выбрать...</button>
            </div>
            <button id="test-break-btn" class="settings-action-btn" style="align-self: flex-start; color: var(--accent-color); padding: 6px 12px; margin-top: 4px;">⚡ Тест сигнала</button>
          </div>
        </div>
      </div>

      <!-- Раздел: Интеграция Т-Банк -->
      <div class="settings-section">
        <div class="settings-section-title">📈 Интеграция Т-Банк</div>
        <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
          <label for="tbank-token">API Токен:</label>
          <div style="display: flex; gap: 6px; width: 100%;">
            <input type="password" id="tbank-token" class="settings-input" placeholder="Введите токен T-Bank API..." style="flex: 1;">
            <button id="save-tbank-token-btn" class="settings-action-btn" style="flex-shrink: 0; padding: 6px 10px;">Сохранить</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
