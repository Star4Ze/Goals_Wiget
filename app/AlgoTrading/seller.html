<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <title>Trading Desk Dashboard</title>
    <meta name="description" content="Local trading desk dashboard UI" />
    <meta name="author" content="Seller Bot" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-8bs86-L9.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CcuRGNLB.css">
    <style>
      /* ===== WINDOW SHELL ===== */
      #fc-window {
        width: 100vw;
        height: 100vh;
        background: #121316;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      #fc-window.is-maximized {
        border-radius: 0;
      }

      /* ===== TITLEBAR ===== */
      #fc-titlebar {
        -webkit-app-region: drag;
        height: 44px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px 0 16px;
        background: linear-gradient(to bottom, rgba(30,32,34,0.9), rgba(18,19,22,0.9));
        border-bottom: 1px solid rgba(255,255,255,0.06);
        direction: ltr !important;
        flex-direction: row !important;
      }
      .fc-titlebar-left {
        display: flex;
        align-items: center;
        gap: 10px;
        direction: ltr !important;
        flex-direction: row !important;
      }
      .fc-titlebar-left .material-symbols-outlined {
        color: #94a3b8;
        font-size: 18px;
      }
      .fc-title-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: #e2e8f0;
        text-transform: uppercase;
      }
      .fc-titlebar-right {
        display: flex;
        align-items: center;
        gap: 2px;
        -webkit-app-region: no-drag;
        direction: ltr !important;
        flex-direction: row !important;
      }
      .fc-win-btn {
        width: 38px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
        transition: background-color 0.12s ease, color 0.12s ease;
      }
      .fc-win-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #e2e8f0;
      }
      .fc-win-btn.fc-close:hover {
        background: #c0392b;
        color: #fff;
      }
      .fc-win-btn .material-symbols-outlined {
        font-size: 16px;
      }

      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="fc-window">
      <!-- ===== TITLEBAR ===== -->
      <div id="fc-titlebar">
        <div class="fc-titlebar-left">
          <span class="material-symbols-outlined">analytics</span>
          <span class="fc-title-text">Seller Dashboard</span>
        </div>
        <div class="fc-titlebar-right">
          <button class="fc-win-btn" id="fc-btn-reload" title="Перезагрузить интерфейс">
            <span class="material-symbols-outlined">refresh</span>
          </button>
          <button class="fc-win-btn" id="fc-btn-min" title="Свернуть">
            <span class="material-symbols-outlined">remove</span>
          </button>
          <button class="fc-win-btn" id="fc-btn-max" title="Развернуть">
            <span class="material-symbols-outlined" id="fc-max-icon">crop_square</span>
          </button>
          <button class="fc-win-btn fc-close" id="fc-btn-close" title="Закрыть">
            <span class="material-symbols-outlined">close</span>
          </button>
      </div>

      <script>
        // ═══════════════════════════════════════════════════════════
        // ELECTRON WINDOW CONTROLS (Isolated Startup)
        // ═══════════════════════════════════════════════════════════
        (function() {
          function addSafeListener(id, event, cb) {
            const el = document.getElementById(id);
            if (el) el.addEventListener(event, cb);
          }

          function setupWindowControls() {
            addSafeListener('fc-btn-reload', 'click', () => {
              window.location.reload();
            });
            addSafeListener('fc-btn-min', 'click', () => {
              window.electronAPI?.minimizeWindow();
            });
            addSafeListener('fc-btn-max', 'click', () => {
              window.electronAPI?.toggleMaximizeWindow();
            });
            addSafeListener('fc-btn-close', 'click', () => {
              window.electronAPI?.closeWindow();
            });

            const titlebar = document.getElementById('fc-titlebar');
            if (titlebar) {
              titlebar.addEventListener('dblclick', (e) => {
                if (e.target.closest('.fc-win-btn')) return;
                window.electronAPI?.toggleMaximizeWindow();
              });
            }

            window.electronAPI?.onWindowStateChange((isMaximized) => {
              const win = document.getElementById('fc-window');
              const maxIcon = document.getElementById('fc-max-icon');
              if (isMaximized) {
                if (win) win.classList.add('is-maximized');
                if (maxIcon) maxIcon.textContent = 'filter_none';
              } else {
                if (win) win.classList.remove('is-maximized');
                if (maxIcon) maxIcon.textContent = 'crop_square';
              }
            });
          }

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupWindowControls);
          } else {
            setupWindowControls();
          }
        })();
      </script>
      
      <!-- React app mount point -->
      <div id="root" style="flex: 1; overflow: hidden; position: relative;"></div>
    </div>

    <script>
    </script>
  </body>
</html>
