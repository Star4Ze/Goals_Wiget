<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Перерыв!</title>
  <style>
    :root {
      --accent-color: #a186f1;
      --accent-hover: #b399ff;
    }
    
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 15, 0.95);
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag; /* make whole window draggable */
      user-select: none;
    }
    
    .content-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
      max-width: 80%;
      -webkit-app-region: no-drag;
      animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    h1 {
      font-size: 32px;
      margin: 0;
      color: var(--accent-color, #a186f1);
      letter-spacing: 1px;
      text-shadow: 0 4px 12px rgba(161, 134, 241, 0.3);
    }
    
    p {
      font-size: 18px;
      color: #b0b0b0;
      margin: 0 0 10px 0;
    }

    .break-countdown {
      color: #f2f2f2;
      font-size: 44px;
      font-weight: 700;
      line-height: 1;
      margin-top: 14px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    .break-countdown-label {
      color: #9d9d9d;
      font-size: 13px;
      margin-top: 8px;
    }
    
    .media-container {
      width: 480px;
      height: 270px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid var(--accent-color, #a186f1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .media-element {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .close-btn {
      background: var(--accent-color, #a186f1);
      color: #1e1e1e;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(161, 134, 241, 0.4);
      transition: all 0.2s ease;
      outline: none;
    }
    
    .close-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(161, 134, 241, 0.6);
      background: var(--accent-hover, #b399ff);
    }
    
    .close-btn:active {
      transform: translateY(0);
    }
    
    /* Default animated break illustration when no media is chosen */
    .default-illustration {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-color, #a186f1), var(--accent-hover, #b399ff));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      animation: pulse 2s infinite ease-in-out;
      box-shadow: 0 0 30px rgba(161, 134, 241, 0.4);
    }
    
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 30px rgba(161, 134, 241, 0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(161, 134, 241, 0.6); }
      100% { transform: scale(1); box-shadow: 0 0 30px rgba(161, 134, 241, 0.4); }
    }
  </style>
</head>
<body>
  <div class="content-container">
    <div class="default-illustration" id="illustration">☕</div>
    <div class="media-container" id="media-container" style="display: none;">
      <!-- Dynamic media element (img or video) -->
    </div>
    
    <div>
      <h1>Время сделать перерыв!</h1>
      <p>Оторвитесь от экрана, разомнитесь, выпейте воды.</p>
      <div class="break-countdown" id="break-countdown">5:00</div>
      <div class="break-countdown-label">Рекомендуемая длина перерыва</div>
    </div>
    
    <button class="close-btn" id="close-btn">Вернуться к работе</button>
  </div>

  <script>
    function playToneSequence(sequence) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;

        sequence.forEach((tone) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const start = now + tone.delay;
          const end = start + tone.duration;

          osc.type = tone.type || 'sine';
          osc.frequency.setValueAtTime(tone.from, start);
          osc.frequency.exponentialRampToValueAtTime(tone.to || tone.from, end);
          gain.gain.setValueAtTime(tone.volume || 0.22, start);
          gain.gain.exponentialRampToValueAtTime(0.001, end);

          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(start);
          osc.stop(end);
        });
      } catch (e) {
        console.error("Audio error:", e);
      }
    }

    function playSelectedSound(sound) {
      const presets = {
        chime: [
          { from: 523.25, to: 783.99, delay: 0, duration: 1.4, volume: 0.24 },
          { from: 659.25, to: 1046.50, delay: 0.05, duration: 1.4, volume: 0.2 }
        ],
        bell: [
          { from: 880, to: 880, delay: 0, duration: 0.28, volume: 0.25 },
          { from: 1174.66, to: 1174.66, delay: 0.18, duration: 0.4, volume: 0.2 },
          { from: 1567.98, to: 1567.98, delay: 0.42, duration: 0.55, volume: 0.16 }
        ],
        focus: [
          { from: 392, to: 523.25, delay: 0, duration: 0.35, volume: 0.22, type: 'triangle' },
          { from: 523.25, to: 659.25, delay: 0.32, duration: 0.35, volume: 0.2, type: 'triangle' },
          { from: 659.25, to: 783.99, delay: 0.64, duration: 0.45, volume: 0.18, type: 'triangle' }
        ],
        water: [
          { from: 1046.5, to: 698.46, delay: 0, duration: 0.25, volume: 0.18 },
          { from: 1318.51, to: 783.99, delay: 0.22, duration: 0.32, volume: 0.14 }
        ]
      };

      if (sound !== 'none') {
        playToneSequence(presets[sound] || presets.chime);
      }
    }

    // Get parameters
    const params = new URLSearchParams(window.location.search);
    const mediaPath = params.get('media');
    const accentColor = params.get('accent') || '#a186f1';
    const accentHover = params.get('hover') || '#b399ff';
    const sound = params.get('sound') || 'chime';

    playSelectedSound(sound);
    
    // Apply colors to variables
    document.documentElement.style.setProperty('--accent-color', accentColor);
    document.documentElement.style.setProperty('--accent-hover', accentHover);
    
    if (mediaPath) {
      const container = document.getElementById('media-container');
      const ill = document.getElementById('illustration');
      
      const isVideo = /\.(mp4|webm|ogg|mov)$/i.test(mediaPath);
      let el;
      if (isVideo) {
        el = document.createElement('video');
        el.src = mediaPath;
        el.className = 'media-element';
        el.autoplay = true;
        el.loop = true;
        el.muted = false; // play sound if it has video sound!
        el.controls = true;
      } else {
        el = document.createElement('img');
        el.src = mediaPath;
        el.className = 'media-element';
      }
      
      container.innerHTML = '';
      container.appendChild(el);
      container.style.display = 'flex';
      ill.style.display = 'none';
    }

    const countdownEl = document.getElementById('break-countdown');
    const breakEndsAt = Date.now() + 5 * 60 * 1000;

    function updateBreakCountdown() {
      const remainingSeconds = Math.max(0, Math.ceil((breakEndsAt - Date.now()) / 1000));
      const minutes = Math.floor(remainingSeconds / 60);
      const seconds = remainingSeconds % 60;
      countdownEl.textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;
      if (remainingSeconds <= 0) {
        clearInterval(countdownTimer);
      }
    }

    const countdownTimer = setInterval(updateBreakCountdown, 1000);
    updateBreakCountdown();
    
    document.getElementById('close-btn').addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
